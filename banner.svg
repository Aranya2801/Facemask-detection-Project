<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#060a0e"/>
      <stop offset="100%" stop-color="#0d1a2e"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#00c8ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bg)" rx="10"/>

  <!-- Grid lines -->
  <g stroke="rgba(0,255,136,0.04)" stroke-width="1">
    <line x1="0" y1="40"  x2="900" y2="40"/>
    <line x1="0" y1="80"  x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="180" y1="0" x2="180" y2="200"/>
    <line x1="360" y1="0" x2="360" y2="200"/>
    <line x1="540" y1="0" x2="540" y2="200"/>
    <line x1="720" y1="0" x2="720" y2="200"/>
  </g>

  <!-- Border -->
  <rect width="898" height="198" fill="none" stroke="rgba(0,255,136,0.2)" stroke-width="1.5" rx="10" x="1" y="1"/>

  <!-- Left hexagon logo -->
  <g transform="translate(60, 100)" filter="url(#glow)">
    <path d="M0,-48 L42,-24 L42,24 L0,48 L-42,24 L-42,-24 Z"
          fill="rgba(0,255,136,0.08)" stroke="#00ff88" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="18" fill="rgba(0,255,136,0.12)" stroke="#00ff88" stroke-width="1"/>
    <circle cx="0" cy="0" r="7" fill="#00ff88"/>
    <line x1="0" y1="-18" x2="0" y2="-30" stroke="#00ff88" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="18"  x2="0" y2="30"  stroke="#00ff88" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-18" y1="0" x2="-30" y2="0" stroke="#00ff88" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="18"  y1="0" x2="30"  y2="0" stroke="#00ff88" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Title -->
  <text x="135" y="90"
        font-family="'Arial Black', 'Arial', sans-serif"
        font-size="44" font-weight="900"
        letter-spacing="3"
        fill="url(#titleGrad)">FACEMASK DETECTION</text>

  <!-- Subtitle -->
  <text x="137" y="120"
        font-family="'Courier New', monospace"
        font-size="14" letter-spacing="6"
        fill="rgba(0,200,255,0.7)">REAL-TIME AI-POWERED MASK COMPLIANCE MONITORING</text>

  <!-- Badges row -->
  <!-- MobileNetV2 -->
  <rect x="136" y="138" width="120" height="22" rx="3" fill="rgba(255,111,0,0.15)" stroke="rgba(255,111,0,0.4)" stroke-width="1"/>
  <text x="196" y="153" font-family="monospace" font-size="11" fill="#FF6F00" text-anchor="middle" letter-spacing="1">MobileNetV2</text>

  <!-- OpenCV -->
  <rect x="264" y="138" width="90" height="22" rx="3" fill="rgba(92,62,232,0.15)" stroke="rgba(92,62,232,0.4)" stroke-width="1"/>
  <text x="309" y="153" font-family="monospace" font-size="11" fill="#5C3EE8" text-anchor="middle" letter-spacing="1">OpenCV</text>

  <!-- Accuracy -->
  <rect x="362" y="138" width="105" height="22" rx="3" fill="rgba(255,107,107,0.15)" stroke="rgba(255,107,107,0.4)" stroke-width="1"/>
  <text x="415" y="153" font-family="monospace" font-size="11" fill="#ff6b6b" text-anchor="middle" letter-spacing="1">98.7% Accuracy</text>

  <!-- MIT -->
  <rect x="475" y="138" width="80" height="22" rx="3" fill="rgba(0,210,170,0.12)" stroke="rgba(0,210,170,0.35)" stroke-width="1"/>
  <text x="515" y="153" font-family="monospace" font-size="11" fill="#00d2aa" text-anchor="middle" letter-spacing="1">MIT License</text>

  <!-- Right side: detection boxes illustration -->
  <g transform="translate(720, 50)">
    <!-- Face 1: with mask (green) -->
    <rect x="10" y="10" width="60" height="70" rx="3" fill="none" stroke="#00ff88" stroke-width="1.5"/>
    <text x="40" y="95" font-family="monospace" font-size="9" fill="#00ff88" text-anchor="middle">MASK ON</text>
    <rect x="10" y="10" width="60" height="16" rx="0" fill="rgba(0,255,136,0.6)"/>
    <text x="40" y="22" font-family="monospace" font-size="9" fill="#060a0e" text-anchor="middle">99%</text>
    <!-- Corner accents -->
    <polyline points="10,28 10,10 28,10" fill="none" stroke="#00ff88" stroke-width="2"/>
    <polyline points="52,10 70,10 70,28" fill="none" stroke="#00ff88" stroke-width="2"/>
    <polyline points="10,62 10,80 28,80" fill="none" stroke="#00ff88" stroke-width="2"/>
    <polyline points="52,80 70,80 70,62" fill="none" stroke="#00ff88" stroke-width="2"/>

    <!-- Face 2: no mask (red) -->
    <rect x="90" y="10" width="60" height="70" rx="3" fill="none" stroke="#ff3b5c" stroke-width="1.5"/>
    <text x="120" y="95" font-family="monospace" font-size="9" fill="#ff3b5c" text-anchor="middle">NO MASK</text>
    <rect x="90" y="10" width="60" height="16" rx="0" fill="rgba(255,59,92,0.6)"/>
    <text x="120" y="22" font-family="monospace" font-size="9" fill="white" text-anchor="middle">97%</text>
    <polyline points="90,28 90,10 108,10" fill="none" stroke="#ff3b5c" stroke-width="2"/>
    <polyline points="132,10 150,10 150,28" fill="none" stroke="#ff3b5c" stroke-width="2"/>
    <polyline points="90,62 90,80 108,80" fill="none" stroke="#ff3b5c" stroke-width="2"/>
    <polyline points="132,80 150,80 150,62" fill="none" stroke="#ff3b5c" stroke-width="2"/>
  </g>

  <!-- Bottom tagline -->
  <text x="450" y="188"
        font-family="'Courier New', monospace"
        font-size="10" letter-spacing="4"
        fill="rgba(0,255,136,0.3)"
        text-anchor="middle">github.com/Aranya2801/Facemask-detection-Project</text>
</svg>
